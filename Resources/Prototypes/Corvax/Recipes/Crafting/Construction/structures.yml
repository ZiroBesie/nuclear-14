- type: construction # Forge-Change
  name: Cross
  id: Cross
  graph: Cross14
  startNode: start
  targetNode: cross
  category: construction-category-utilities
  description: A heavy wooden cross for public punishment.
  icon:
   sprite: Corvax/Structures/Misc/cross.rsi
   state: cross_empty
  objectType: Structure
  placementMode: SnapgridCenter
  hide: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: Cross14
  start: start
  graph:
    - node: start
      edges:
        - to: cross
          steps:
            - material: N14Timber
              amount: 5
              doAfter: 2
          completed:
            - !type:SnapToGrid
              southRotation: true

    - node: cross
      entity: Cross
      edges:
        - to: start
          steps:
            - tool: Prying
              doAfter: 5
          completed:
            - !type:GivePrototype
              prototype: N14FloraLogTimber
              amount: 2
            - !type:DeleteEntity {}


